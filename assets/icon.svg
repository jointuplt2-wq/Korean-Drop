<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#07071e"/>
      <stop offset="100%" stop-color="#10103a"/>
    </linearGradient>
    <radialGradient id="glow-bg" cx="50%" cy="44%" r="38%">
      <stop offset="0%"   stop-color="#FFD700" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-f" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <rect width="512" height="512" rx="88" fill="url(#glow-bg)"/>

  <!-- Stars -->
  <circle cx="72"  cy="78"  r="3"   fill="white" opacity="0.70"/>
  <circle cx="182" cy="44"  r="2"   fill="white" opacity="0.55"/>
  <circle cx="398" cy="66"  r="2.5" fill="white" opacity="0.60"/>
  <circle cx="454" cy="156" r="2"   fill="white" opacity="0.40"/>
  <circle cx="86"  cy="196" r="2"   fill="white" opacity="0.38"/>
  <circle cx="444" cy="272" r="2.5" fill="white" opacity="0.50"/>
  <circle cx="98"  cy="374" r="1.5" fill="white" opacity="0.30"/>
  <circle cx="424" cy="412" r="2"   fill="white" opacity="0.35"/>
  <circle cx="312" cy="92"  r="1.5" fill="white" opacity="0.42"/>
  <circle cx="340" cy="430" r="1.5" fill="white" opacity="0.28"/>

  <!-- Drop trail -->
  <rect x="249" y="356" width="4"  height="74" rx="2" fill="#FFD700" opacity="0.38"/>
  <rect x="250" y="322" width="3"  height="34" rx="2" fill="#FFD700" opacity="0.20"/>

  <!-- Main Korean character with glow -->
  <text
    x="256" y="348"
    font-size="272"
    font-family="'Malgun Gothic','Apple SD Gothic Neo','NanumGothic',sans-serif"
    text-anchor="middle"
    fill="#FFD700"
    filter="url(#glow-f)">가</text>

  <!-- Splash drops -->
  <ellipse cx="256" cy="452" rx="48" ry="9"   fill="#FFD700" opacity="0.28"/>
  <ellipse cx="256" cy="452" rx="28" ry="5.5" fill="#FFD700" opacity="0.46"/>
</svg>
