<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>타자 연습게임</title>
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <meta property="og:title" content="타자 연습게임">
  <meta property="og:description" content="하늘에서 떨어지는 낱말을 타이핑하여 격추하는 한글/영어 낙하 타자 연습 게임">
  <meta property="og:image" content="build/og-image.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body { user-select: none; }
    #game-wrapper { position: relative; width: 800px; height: 600px; flex-shrink: 0; }
    #canvas { display: block; }
    #input-area {
      display: none;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 280px;
    }
    #word-input {
      width: 100%;
      padding: 10px 16px;
      font-size: 22px;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'NanumGothic', sans-serif;
      background: rgba(8, 8, 40, 0.88);
      border: 2px solid rgba(255, 255, 255, 0.45);
      border-radius: 10px;
      color: #fff;
      outline: none;
      text-align: center;
      caret-color: #FFD700;
      letter-spacing: 3px;
    }
    #word-input:focus {
      border-color: #FFD700;
      box-shadow: 0 0 14px rgba(255, 215, 0, 0.35);
    }
    #word-input::placeholder {
      color: rgba(255, 255, 255, 0.32);
      font-size: 14px;
      letter-spacing: 0;
    }
    /* ── 이름 입력 팝업 ── */
    #name-popup {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 800px; height: 600px;
      background: rgba(0, 0, 0, 0.72);
      z-index: 20;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #name-popup.active { display: flex; }
    #name-card {
      background: rgba(7, 7, 30, 0.97);
      border: 1.5px solid rgba(255, 215, 0, 0.45);
      border-radius: 16px;
      padding: 40px 56px 36px;
      text-align: center;
      box-shadow: 0 0 48px rgba(255, 215, 0, 0.14);
      min-width: 320px;
    }
    #name-card h2 {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'NanumGothic', sans-serif;
      color: #FFD700;
      font-size: 20px;
      margin-bottom: 6px;
    }
    #name-card p {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'NanumGothic', sans-serif;
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      margin-bottom: 22px;
    }
    #name-input {
      display: block;
      width: 100%;
      padding: 10px 14px;
      font-size: 20px;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'NanumGothic', sans-serif;
      background: rgba(255, 255, 255, 0.06);
      border: 1.5px solid rgba(255, 215, 0, 0.38);
      border-radius: 8px;
      color: #fff;
      outline: none;
      text-align: center;
      caret-color: #FFD700;
      margin-bottom: 18px;
      letter-spacing: 2px;
    }
    #name-input:focus { border-color: #FFD700; box-shadow: 0 0 14px rgba(255, 215, 0, 0.28); }
    #name-ok {
      width: 100%;
      padding: 11px;
      font-size: 16px;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'NanumGothic', sans-serif;
      background: #FFD700;
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
      transition: background 0.15s;
    }
    #name-ok:hover { background: #FFE44D; }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="canvas" width="800" height="600"></canvas>
    <div id="input-area">
      <input
        type="text"
        id="word-input"
        placeholder="단어 입력 후 Enter"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
    </div>
    <div id="name-popup">
      <div id="name-card">
        <h2>플레이어 이름 입력</h2>
        <p>이름을 입력하지 않으면 'Player'로 저장됩니다</p>
        <input
          type="text"
          id="name-input"
          maxlength="12"
          placeholder="이름 (최대 12자)"
          autocomplete="off"
          spellcheck="false"
        >
        <button id="name-ok">시작하기 ▶</button>
      </div>
    </div>
  </div>
  <script src="words.js"></script>
  <script src="game.js"></script>
</body>
</html>
